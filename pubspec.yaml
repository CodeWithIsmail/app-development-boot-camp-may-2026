name: mexpense
description: "MExpense - Expense tracker app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2+1
  path: ^1.9.1
  crypto: ^3.0.7
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  font_awesome_flutter: ^11.0.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"          
  image: "assets/images/logo.png" 
  android_12:                
    image: "assets/images/logo.png"
    color: "#ffffff"