publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2+1
  path: ^1.9.1
